<div class="container mt-4">
    <h2 class="mb-4">Listado de Celulares</h2>

    <div class="row mb-4">
        <div class="col-md-5">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Buscar por marca..." [(ngModel)]="marcaBusqueda"(keyup.enter)="buscarPorMarca()">
                
               <button class="btn btn-dark" type="button" (click)="marcaBusqueda = ''; listarCelulares()" [disabled]="!marcaBusqueda">
                    <i class="fas fa-undo"></i> Limpiar
                </button>
            </div>
        </div>
        
    </div>

    <div class="row">
        <div class="col-13">
            <table class="table table-dark table-hover shadow-lg">
                <thead class="bg-primary text-white"> 
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">MARCA</th>
                        <th scope="col">MODELO</th>
                        <th scope="col">RAM</th>
                        <th scope="col">PROCESADOR</th>
                        <th scope="col">PRECIO</th>
                        <th scope="col">OPERACIONES</th>
                    </tr>
                </thead>
                <tbody>
                    @for (celu of celulares; track celu.idCelular) {
                    <tr>
                        <td>{{celu.idCelular}}</td>
                        <td>{{celu.marca}}</td>
                        <td>{{celu.modelo}}</td>
                        <td>{{celu.ram}}</td>
                        <td>{{celu.procesador}}</td>
                        <td>{{celu.precio }}</td> <!-- Usando pipe de moneda -->
                        <td>
                            <div class="btn-group" role="group" aria-label="Acciones">
                                <button type="button" class="btn btn-sm btn-warning me-2" (click)="editarButton(celu)">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <button type="button" class="btn btn-sm btn-danger" (click)="btnEliminar(celu)">
                                    <i class="fas fa-trash-alt"></i> Eliminar
                                </button>
                            </div>
                        </td>
                    </tr>
                    }
                    @empty {
                    <tr>
                        <td colspan="7" class="text-center text-white" >
                            No se encontraron celulares para mostrar
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
