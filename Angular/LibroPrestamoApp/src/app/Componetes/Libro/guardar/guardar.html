<div class="container">
    <div class="container">
    <div class="card mx-auto my-4" style="max-width: 50rem;"> 
        <div class="card-header">
            <h2>Guardar Libro</h2>
        </div>
        </div>

        <div class="card-body">
            <form>
                <div>
                    <label for="idLibro">ID LIBRO</label>
                    <input type="number" class="form-control" name="idLibro" [(ngModel)]="libro.idLibro">
                </div>

                <div>
                    <label for="nombre">NOMBRE</label>
                    <input type="text" class="form-control" name="nombre" [(ngModel)]="libro.nombre">
                </div>

                <div>
                    <label for="autor">AUTOR</label>
                    <input type="text" class="form-control" name="autor" [(ngModel)]="libro.autor">
                </div>

                <div>
                    <label for="editorial">EDITORIAL</label>
                    <input type="text" class="form-control" name="editorial" [(ngModel)]="libro.editorial">
                </div>

                <div>
                    <label for="isbn">ISBN</label>
                    <input type="number" class="form-control" name="isbn" [(ngModel)]="libro.isbn">
                </div>

                <div style="text-align: center;" class="mb-3">
                    <button class="btn btn-warning" (click)="guardar()">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>
</div>
