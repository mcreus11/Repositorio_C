<div class="container mt-4">
  
  <button 
    class="btn btn-primary mb-3" 
    (click)="nuevoPrestamo()" 
    style="margin-left: 20px;"
  >
    ➕ Registrar Nuevo Préstamo
  </button>
  
  <div class="card-body">
    <table class="table table-hover-primary">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha Inicio</th>
          <th>Fecha Fin</th>
          <th>Libro Prestado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (prestamo of prestamos; track prestamo.idPrestamo) {
          <tr class="table-secondary">
            <td>{{prestamo.idPrestamo}}</td>
            <td>{{prestamo.fechaInicio}}</td>
            <td>{{prestamo.fechaFin}}</td>
            <td>{{prestamo.libroId?.nombre}}</td> 
            <td>
              <button 
                class="btn btn-warning btn-sm me-2"
                (click)="editar(prestamo)"
              >
                Editar
              </button>
              <button 
                class="btn btn-danger btn-sm"
                (click)="eliminar(prestamo)"
              >
                Eliminar
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" style="text-align: center;">No hay préstamos registrados</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
