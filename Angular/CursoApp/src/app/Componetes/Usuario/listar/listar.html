<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary">Listado de Usuarios</h2>
    
  </div>

  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-body">
      <table class="table table-hover align-middle">
        <thead class="table-primary">
          <tr>
            <th>ID</th>
            <th>Nombre Completo</th>
            <th>Correo</th>
            <th>Sexo</th>
            <th>Fecha Nacimiento</th>
            <th>Rol</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of usuarios">
            <td>{{ user.idUsuario }}</td>
            <td>{{ user.nombre }} {{ user.app }} {{ user.apm }}</td>
            <td>{{ user.correo }}</td>
            <td>{{ user.sexo }}</td>
            <td>{{ user.fechaNacimiento | date: 'yyyy-MM-dd' }}</td>
            <td>{{ user.rol?.privilegio }}</td>
            <td class="text-center">
              <button class="btn btn-warning btn-sm me-2" (click)="editarUsuario(user.idUsuario)">
                <i class="bi bi-pencil-square"></i> Editar
              </button>
              <button class="btn btn-danger btn-sm" (click)="eliminarUsuario(user.idUsuario)">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
