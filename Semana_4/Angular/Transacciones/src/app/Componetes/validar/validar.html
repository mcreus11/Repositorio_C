<div class="container mt-4 p-4 bg-light rounded shadow-sm" style="max-width: 600px;">
  <h3 class="text-center mb-4 text-primary fw-bold">Validar Transaccion</h3>

  <div class="mb-3">
    <label class="form-label">Operacion</label>
    <input type="text" class="form-control" [(ngModel)]="operacion" placeholder="Ej: TRANSFERENCIA">
  </div>

  <div class="mb-3">
    <label class="form-label">Importe</label>
    <input type="number" class="form-control" [(ngModel)]="importe" placeholder="Ej: 1500.50">
  </div>

  <div class="mb-3">
    <label class="form-label">Cliente</label>
    <input type="text" class="form-control" [(ngModel)]="cliente" placeholder="Ej: JUAN">
  </div>

  <div class="mb-3">
    <label class="form-label">SHA Generado</label>
    <input type="text" class="form-control" [(ngModel)]="shaGenerado" readonly>
  </div>

  <div class="d-flex justify-content-between">
    <button class="btn btn-success w-50" (click)="enviar()"> Validar Transacción</button>
  </div>
</div>
